<body>

      <!-- BULK BAR (hidden when nothing selected) -->

              <th class="sortable col-followers" data-sort="igFollowers">Followers <span class="sort-arrow">▾</span></th>
              <th class="sortable col-status" data-sort="status">Status <span class="sort-arrow">▾</span></th>
              <th class="col-tags">Referred By</th>

            </tr>
          </thead>

            <tr><td colspan="10"><div class="empty"><div class="glyph">…</div><div class="title">Loading guests</div></div></td></tr>

      </div>

    </div>
  </main>
</div>

<!-- Hidden context menu / status menu -->
<div class="menu" id="statusMenu"></div>

<script src="/shared/app.js"></script>
<script>
const App = window.ChateauApp;
const { showToast, authFetch, escapeHtml, escapeAttr, formatNumber, formatDate, injectSidebar } = App;

// ============== STATE ==============
const STATUS_OPTIONS = ['Pending', 'Waitlisted', 'Approved', 'Approved Ticket sent', 'Rejected'];
// Display labels shorter than full Airtable values, so pills stay compact
const STATUS_LABEL = {
  'Pending': 'Pending',
  'Waitlisted': 'Waitlist',
  'Approved': 'Approved',
  'Approved Ticket sent': 'Ticket Sent',
  'Rejected': 'Rejected'
};
// Map status to pill class (keys = exact Airtable values)
const STATUS_PILL = {
  'Pending': 'pill-pending',
  'Waitlisted': 'pill-waitlist',
  'Approved': 'pill-approved',
  'Approved Ticket sent': 'pill-sent',
  'Rejected': 'pill-rejected'
};

let allGuests = [];
let sortKey = 'createdTime';
let sortDir = 'desc';
let filters = { search: '', status: '', tag: '', minFollowers: 0 };
let selectedIds = new Set();

// ============== INIT ==============
document.addEventListener('DOMContentLoaded', async () => {
  await injectSidebar('guests');
  populateStatusOptions();
  bindEvents();
  await loadGuests();
});

function populateStatusOptions() {
  const filterSel = document.getElementById('statusFilter');
  const bulkSel = document.getElementById('bulkStatus');
  for (const s of STATUS_OPTIONS) {
    filterSel.add(new Option(s, s));
    bulkSel.add(new Option('Set: ' + s, s));
  }
}

// ============== DATA ==============
async function loadGuests() {
  try {
    const res = await authFetch('/api/guests');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allGuests = data.guests || [];
    renderStats();
    render();
    updateNavBadge();
  } catch (err) {
    showToast('Failed to load: ' + err.message, 'error');
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="10"><div class="empty"><div class="glyph">!</div><div class="title">Failed to load</div><div class="subtitle">${escapeHtml(err.message)}</div></div></td></tr>`;
  }
}

function updateNavBadge() {
  const badge = document.getElementById('navGuestCount');
  if (badge) badge.textContent = allGuests.length;
}

function renderStats() {
  const total = allGuests.length;
  const pending = allGuests.filter(g => g.status === 'Pending').length;
  const waitlisted = allGuests.filter(g => g.status === 'Waitlisted').length;
  const approved = allGuests.filter(g => ['Approved', 'Approved Ticket sent'].includes(g.status)).length;
  const ticketSent = allGuests.filter(g => g.status === 'Approved Ticket sent').length;
  const withIg = allGuests.filter(g => g.igFollowers !== null).length;
  const igPct = total > 0 ? Math.round(withIg / total * 100) : 0;

  document.getElementById('stTotal').textContent = total;
  document.getElementById('stPending').textContent = pending;
  document.getElementById('stConfirmed').textContent = approved;
  document.getElementById('stVIP').textContent = ticketSent;
  document.getElementById('stIG').textContent = withIg;
  document.getElementById('stIGMeta').textContent = total > 0 ? `${igPct}% of total` : '';

  document.getElementById('headerStats').textContent =
    `${total} guests · ${pending} pending · ${approved} approved`;
}

// ============== TAG FILTER POPULATION ==============
function refreshTagFilter() {
  const tagFilter = document.getElementById('tagFilter');
  const currentValue = tagFilter.value;
  // Collect unique tags
  const tags = new Set();
  for (const g of allGuests) {
    if (Array.isArray(g.tags)) g.tags.forEach(t => tags.add(t));
  }
  // Rebuild
  while (tagFilter.options.length > 1) tagFilter.remove(1);
  if (tags.size === 0) {
    tagFilter.disabled = true;
    tagFilter.style.opacity = 0.5;
  } else {
    tagFilter.disabled = false;
    tagFilter.style.opacity = 1;
    [...tags].sort().forEach(t => tagFilter.add(new Option(t, t)));
    tagFilter.value = currentValue || '';
  }
}

// ============== RENDER ==============
function render() {
  refreshTagFilter();
  let rows = applyFilters(allGuests);
  rows = sortRows(rows);
  const tbody = document.getElementById('tbody');

  if (rows.length === 0) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty"><div class="glyph">—</div><div class="title">No guests match the filters</div><div class="subtitle">Try clearing the filters or search query.</div></div></td></tr>`;
    updateSortIndicators();
    updateBulkBar();
    return;
  }

  tbody.innerHTML = rows.map(rowHtml).join('');
  updateSortIndicators();
  updateBulkBar();
  bindRowEvents();
}

function rowHtml(g) {
  const initial = (g.name || '?').trim().charAt(0).toUpperCase();
  const avatar = g.igAvatarUrl
    ? `<span class="avatar" style="background-image:url('/api/avatar?url=${encodeURIComponent(g.igAvatarUrl)}')"></span>`
    : `<span class="avatar avatar-placeholder">${escapeHtml(initial)}</span>`;

  const followers = g.igFollowers !== null
    ? `<span class="tabular ${g.igFollowers >= 10000 ? 'text-gold' : ''}">${formatNumber(g.igFollowers)}</span>`
    : `<span class="muted">—</span>`;

  const statusKey = g.status || 'Pending';
  const pillClass = STATUS_PILL[statusKey] || 'pill-default';
  const pillLabel = STATUS_LABEL[statusKey] || statusKey;
  const statusPill = `<span class="pill ${pillClass} pill-clickable" data-action="status" data-id="${g.id}" title="${escapeAttr(statusKey)}">${escapeHtml(pillLabel)}</span>`;

  // Messaging indicator: shown when guest is already in the messaging workflow
  const msgIndicator = g.messagingStatus
    ? `<a href="/messaging" class="msg-indicator msg-${g.messagingStatus.toLowerCase().replace(/\s/g, '-')}" title="In messaging: ${escapeAttr(g.messagingStatus)} — click to open messaging" onclick="event.stopPropagation()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
       </a>`
    : '';

  const needsHandleEdit = g.igFollowers === null;
  const editBtn = needsHandleEdit
    ? `<button class="ig-edit-btn" data-action="edit-ig" data-id="${g.id}" data-handle="${escapeAttr(g.instagram)}" title="Edit Instagram handle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>`
    : '';
  const igDisplay = g.instagram && g.instagram.length > 30
    ? escapeHtml(g.instagram.substring(0, 30)) + '…'
    : escapeHtml(g.instagram);
  const igCell = g.instagram
    ? `<div class="ig-cell" data-id="${g.id}"><span class="ig-handle" title="@${escapeAttr(g.instagram)}"><a href="https://instagram.com/${encodeURIComponent(g.instagram)}" target="_blank" rel="noopener">@${igDisplay}</a></span>${editBtn}</div>`
    : `<div class="ig-cell" data-id="${g.id}"><span class="muted">—</span>${editBtn}</div>`;

  const referralHtml = g.referredBy
    ? `<span style="font-size:13px;color:var(--ink)">${escapeHtml(g.referredBy)}</span>`
    : '<span class="muted">—</span>';

  const notesPreview = g.notes
    ? `<span class="notes-preview" title="${escapeAttr(g.notes)}">${escapeHtml(g.notes)}</span>`
    : '<span class="muted">—</span>';
  const notesCell = `<div class="ig-cell" data-id="${g.id}">${notesPreview}<button class="row-edit-btn" data-action="edit-notes" data-id="${g.id}" data-notes="${escapeAttr(g.notes)}" title="Edit notes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button></div>`;

  const submitted = g.createdTime ? formatDate(g.createdTime) : '';
  const isSelected = selectedIds.has(g.id);

  return `
    <tr class="${isSelected ? 'selected' : ''}" data-id="${g.id}">
      <td class="col-check"><span class="checkbox row-checkbox ${isSelected ? 'checked' : ''}" data-id="${g.id}"></span></td>
      <td class="col-name">
        <div class="name-block">
          ${avatar}
          <div class="name-text">
            <div style="font-weight:500;color:var(--ink)">${escapeHtml(g.name) || '—'}</div>
            <div style="font-size:11px;color:var(--ink-faint)">${escapeHtml(g.email)}</div>
          </div>
        </div>
      </td>
      <td class="col-ig">${igCell}</td>
      <td class="col-followers">${followers}</td>
      <td class="col-status"><div class="status-cell">${statusPill}${msgIndicator}</div></td>
      <td class="col-tags">${referralHtml}</td>
      <td class="col-notes">${notesCell}</td>
      <td class="col-submitted"><span class="muted">${submitted}</span></td>
      <td class="col-phone"><span class="tabular muted">${escapeHtml(g.phone)}</span></td>
      <td class="col-actions">
        <div class="flex items-center gap-2" style="justify-content:flex-end">
          <button class="icon-btn" data-action="refresh-one" data-id="${g.id}" title="Refresh IG data for this guest">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>
          </button>
        </div>
      </td>
    </tr>
  `;
}

function applyFilters(list) {
  return list.filter(g => {
    if (filters.status && g.status !== filters.status) return false;
    if (filters.tag && !(Array.isArray(g.tags) && g.tags.includes(filters.tag))) return false;
    if (filters.minFollowers > 0) {
      if (g.igFollowers === null || g.igFollowers < filters.minFollowers) return false;
    }
    if (filters.search) {
      const q = filters.search.toLowerCase();
      const haystack = [g.name, g.email, g.instagram, g.company, g.referredBy, g.notes].join(' ').toLowerCase();
      if (!haystack.includes(q)) return false;
    }
    return true;
  });
}

function sortRows(list) {
  return [...list].sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av === null || av === undefined || av === '') av = sortDir === 'asc' ? Infinity : -Infinity;
    if (bv === null || bv === undefined || bv === '') bv = sortDir === 'asc' ? Infinity : -Infinity;
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
}

function updateSortIndicators() {
  document.querySelectorAll('th.sortable').forEach(th => {
    th.classList.remove('sorted');
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.sort === sortKey) {
      th.classList.add('sorted');
      if (arrow) arrow.textContent = sortDir === 'asc' ? '▴' : '▾';
    } else if (arrow) arrow.textContent = '▾';
  });
}

// ============== SELECTION / BULK ==============
function toggleRowSelection(id) {
  if (selectedIds.has(id)) selectedIds.delete(id); else selectedIds.add(id);
  render();
}

function updateBulkBar() {
  const bar = document.getElementById('bulkBar');
  const count = selectedIds.size;
  if (count === 0) { bar.classList.add('hidden'); return; }
  bar.classList.remove('hidden');
  document.getElementById('bulkCount').textContent = `${count} selected`;
}

function selectAllVisible() {
  const visible = applyFilters(allGuests).map(g => g.id);
  const allSelected = visible.every(id => selectedIds.has(id));
  if (allSelected) {
    visible.forEach(id => selectedIds.delete(id));
  } else {
    visible.forEach(id => selectedIds.add(id));
  }
  render();
}

// ============== EVENT BINDING ==============
function bindEvents() {
  document.getElementById('searchInput').addEventListener('input', e => {
    filters.search = e.target.value.trim();
    render();
  });
  document.getElementById('statusFilter').addEventListener('change', e => {
    filters.status = e.target.value;
    render();
  });
  document.getElementById('tagFilter').addEventListener('change', e => {
    filters.tag = e.target.value;
    render();
  });
  document.getElementById('minFollowers').addEventListener('input', e => {
    filters.minFollowers = parseInt(e.target.value) || 0;
    render();
  });
  document.getElementById('sortPreset').addEventListener('change', e => {
    const [key, dir] = e.target.value.split(':');
    sortKey = key; sortDir = dir;
    render();
  });
  document.getElementById('resetFiltersBtn').addEventListener('click', () => {
    filters = { search: '', status: '', tag: '', minFollowers: 0 };
    sortKey = 'createdTime'; sortDir = 'desc';
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('tagFilter').value = '';
    document.getElementById('minFollowers').value = '';
    document.getElementById('sortPreset').value = 'createdTime:desc';
    render();
  });
  document.getElementById('reloadBtn').addEventListener('click', loadGuests);
  document.getElementById('refreshBtn').addEventListener('click', refreshAll);

  document.getElementById('selectAllCb').addEventListener('click', selectAllVisible);

  document.querySelectorAll('th.sortable').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = (key === 'igFollowers' || key === 'createdTime') ? 'desc' : 'asc'; }
      const presetVal = `${sortKey}:${sortDir}`;
      const sel = document.getElementById('sortPreset');
      const opt = Array.from(sel.options).find(o => o.value === presetVal);
      sel.value = opt ? presetVal : '';
      render();
    });
  });

  document.getElementById('bulkStatus').addEventListener('change', e => {
    const status = e.target.value;
    if (status) bulkUpdateStatus(status);
    e.target.value = '';
  });
  document.getElementById('bulkListMessaging').addEventListener('click', bulkListForMessaging);
  document.getElementById('bulkDeselectBtn').addEventListener('click', () => {
    selectedIds.clear();
    render();
  });
}

async function bulkListForMessaging() {
  const ids = Array.from(selectedIds);
  if (ids.length === 0) return;

  const btn = document.getElementById('bulkListMessaging');
  btn.disabled = true;
  const originalHtml = btn.innerHTML;
  btn.innerHTML = 'Adding…';

  try {
    const res = await authFetch('/api/messaging/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordIds: ids })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    let msg;
    if (data.added > 0 && data.skipped > 0) {
      msg = `Added ${data.added} to messaging · ${data.skipped} skipped (already in)`;
    } else if (data.added > 0) {
      msg = `Added ${data.added} to messaging`;
    } else if (data.skipped > 0) {
      msg = `All ${data.skipped} already in messaging — none added`;
    } else {
      msg = 'No changes made';
    }
    showToast(msg, data.added > 0 ? 'success' : '');

    selectedIds.clear();
    await loadGuests();
  } catch (err) {
    showToast('Failed: ' + err.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = originalHtml;
  }
}

function bindRowEvents() {
  document.querySelectorAll('.row-checkbox').forEach(cb => {
    cb.addEventListener('click', e => {
      e.stopPropagation();
      toggleRowSelection(cb.dataset.id);
    });
  });
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const action = el.dataset.action;
      const id = el.dataset.id;
      if (action === 'status') openStatusMenu(el, id);
      if (action === 'edit-ig') openIgEditor(el);
      if (action === 'edit-notes') openNotesEditor(el);
      if (action === 'refresh-one') refreshOne(id, el);
    });
  });
}

// ============== STATUS MENU ==============
function openStatusMenu(anchor, recordId) {
  const menu = document.getElementById('statusMenu');
  const rect = anchor.getBoundingClientRect();
  menu.innerHTML = STATUS_OPTIONS.map(s =>
    `<div class="menu-item" data-status="${escapeAttr(s)}"><span class="pill ${STATUS_PILL[s]||'pill-default'}" style="pointer-events:none">${escapeHtml(STATUS_LABEL[s]||s)}</span></div>`
  ).join('') + '<div class="menu-divider"></div>' +
    `<div class="menu-item danger" data-status=""><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Clear status</div>`;
  menu.style.top = (rect.bottom + window.scrollY + 4) + 'px';
  menu.style.left = (rect.left + window.scrollX) + 'px';
  menu.classList.add('open');

  // Close on outside click
  setTimeout(() => {
    document.addEventListener('click', closeMenuOnce, { once: true });
  }, 0);

  // Bind item clicks
  menu.querySelectorAll('.menu-item').forEach(item => {
    item.addEventListener('click', async e => {
      e.stopPropagation();
      const newStatus = item.dataset.status;
      menu.classList.remove('open');
      await updateRecordField(recordId, 'Status', newStatus || null);
    });
  });
}
function closeMenuOnce() {
  document.getElementById('statusMenu').classList.remove('open');
}

// ============== INLINE EDITORS ==============
function openIgEditor(btn) {
  const recordId = btn.dataset.id;
  const handle = btn.dataset.handle || '';
  const cell = btn.closest('.ig-cell');
  if (!cell) return;
  cell.innerHTML = `
    <div class="inline-editor">
      <span class="muted">@</span>
      <input type="text" value="${escapeAttr(handle)}" placeholder="username" maxlength="30">
      <button class="inline-editor-btn save" title="Save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="inline-editor-btn cancel" title="Cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  `;
  const input = cell.querySelector('input');
  const saveBtn = cell.querySelector('.save');
  const cancelBtn = cell.querySelector('.cancel');
  input.focus(); input.select();
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); saveIg(recordId, input, saveBtn, cancelBtn); }
    if (e.key === 'Escape') { e.preventDefault(); render(); }
  });
  saveBtn.addEventListener('click', () => saveIg(recordId, input, saveBtn, cancelBtn));
  cancelBtn.addEventListener('click', () => render());
}

async function saveIg(recordId, input, saveBtn, cancelBtn) {
  const cleaned = input.value.trim()
    .replace(/^@/, '')
    .replace(/^https?:\/\/(www\.)?instagram\.com\//i, '')
    .replace(/\/.*$/, '')
    .replace(/\?.*$/, '');
  if (cleaned.length < 1) { showToast('Handle cannot be empty', 'error'); return; }

  saveBtn.disabled = true; cancelBtn.disabled = true; input.disabled = true;
  saveBtn.innerHTML = '<span class="spinner" style="width:11px;height:11px;border-width:1.5px"></span>';
  try {
    const res = await authFetch('/api/update-record', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, fields: { Instagram: cleaned } })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Save failed');
    }
    showToast('Handle updated, fetching IG data…', 'success');
    // Trigger Apify refresh for this record
    const r = await authFetch('/api/refresh', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordIds: [recordId] })
    });
    const rd = await r.json();
    if (r.ok && rd.updated > 0) showToast('Profile fetched', 'success');
    else if (r.ok) showToast('Handle saved, but IG profile not found', 'warning');
    await loadGuests();
  } catch (err) {
    showToast(err.message, 'error');
    render();
  }
}

function openNotesEditor(btn) {
  const recordId = btn.dataset.id;
  const notes = btn.dataset.notes || '';
  const cell = btn.closest('.ig-cell');
  if (!cell) return;
  cell.innerHTML = `
    <div class="inline-editor">
      <textarea placeholder="Internal notes…">${escapeHtml(notes)}</textarea>
      <button class="inline-editor-btn save" title="Save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg></button>
      <button class="inline-editor-btn cancel" title="Cancel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
  `;
  const ta = cell.querySelector('textarea');
  const saveBtn = cell.querySelector('.save');
  const cancelBtn = cell.querySelector('.cancel');
  ta.focus();
  ta.addEventListener('keydown', e => {
    if ((e.key === 'Enter' && (e.metaKey || e.ctrlKey))) { e.preventDefault(); saveNotes(recordId, ta, saveBtn, cancelBtn); }
    if (e.key === 'Escape') { e.preventDefault(); render(); }
  });
  saveBtn.addEventListener('click', () => saveNotes(recordId, ta, saveBtn, cancelBtn));
  cancelBtn.addEventListener('click', () => render());
}

async function saveNotes(recordId, ta, saveBtn, cancelBtn) {
  saveBtn.disabled = true; cancelBtn.disabled = true; ta.disabled = true;
  saveBtn.innerHTML = '<span class="spinner" style="width:11px;height:11px;border-width:1.5px"></span>';
  try {
    const res = await authFetch('/api/update-record', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, fields: { 'Internal Notes': ta.value } })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Save failed');
    }
    showToast('Notes saved', 'success');
    await loadGuests();
  } catch (err) {
    showToast(err.message, 'error');
    render();
  }
}

// ============== STATUS UPDATE ==============
async function updateRecordField(recordId, fieldName, value) {
  const fields = { [fieldName]: value };
  try {
    const res = await authFetch('/api/update-record', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordId, fields })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Update failed');
    }
    showToast(`Status updated to ${value || '—'}`, 'success');
    // optimistic local update
    const guest = allGuests.find(g => g.id === recordId);
    if (guest) guest[fieldName.toLowerCase()] = value;
    renderStats();
    render();
    // Also fire-and-forget reload from server to be safe
    setTimeout(loadGuests, 1000);
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ============== BULK STATUS ==============
async function bulkUpdateStatus(status) {
  if (selectedIds.size === 0) return;
  const ids = [...selectedIds];
  showToast(`Updating ${ids.length} guests…`, '');
  try {
    const res = await authFetch('/api/update-bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordIds: ids, fields: { Status: status } })
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error || 'Bulk update failed');
    }
    const data = await res.json();
    showToast(`${data.updated} guests updated to ${status}`, 'success');
    selectedIds.clear();
    await loadGuests();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

// ============== APIFY REFRESH ==============
async function refreshAll() {
  const btn = document.getElementById('refreshBtn');
  const label = document.getElementById('refreshLabel');
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span>&nbsp;Scraping…';
  try {
    const res = await authFetch('/api/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({})
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Refresh failed');
    showToast(`Refreshed ${data.updated} of ${data.targets} profiles`, 'success');
    await loadGuests();
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false;
    label.textContent = 'Refresh IG';
  }
}

async function refreshOne(recordId, btn) {
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'; }
  try {
    const res = await authFetch('/api/refresh', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recordIds: [recordId] })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Refresh failed');
    if (data.updated > 0) showToast('Profile refreshed', 'success');
    else showToast('No data found for this profile', 'warning');
    await loadGuests();
  } catch (err) {
    showToast(err.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7"/><path d="M21 4v5h-5"/></svg>'; }
  }
}
